<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fawaad & Mahira - Wedding Invitation</title>
  
  <!-- External CSS Link -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            offwhite: '#F9F8F6',
            sage: '#87A96B',
            deepgreen: '#2C4C3B',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Poppins"', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans text-deepgreen antialiased">

  <!-- "Wow" Element: Gate Opening -->
  <div class="gate-container">
    <div class="gate-left">
      <h1 class="text-offwhite font-serif text-5xl md:text-7xl opacity-50">Fawaad</h1>
    </div>
    <div class="gate-right">
      <h1 class="text-offwhite font-serif text-5xl md:text-7xl opacity-50">Mahira</h1>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="min-h-screen flex flex-col items-center justify-center pt-20 pb-10 px-4 relative overflow-hidden">
    <h2 class="font-serif text-4xl md:text-6xl text-sage mb-12 italic text-center drop-shadow-md">The Wedding Celebration</h2>
    
    <div class="flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 relative z-10 w-full max-w-5xl">
      <!-- Fawaad -->
      <div class="w-64 h-80 md:w-80 md:h-[28rem] rounded-2xl overflow-hidden float-3d border-4 border-sage">
        <img src="1000178606.jpg" alt="Fawaad Khan" class="w-full h-full object-cover">
      </div>
      
      <!-- Rings -->
      <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center hidden md:flex">
        <div class="bg-offwhite p-4 rounded-full shadow-2xl border border-sage">
           <svg class="w-12 h-12 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm-4.5-3.5a5.98 5.98 0 00-1.5 4c0 3.31 2.69 6 6 6s6-2.69 6-6a5.98 5.98 0 00-1.5-4"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7.5 10.5A5.98 5.98 0 019 6.5C9 3.46 6.54 1 3.5 1S-2 3.46-2 6.5a5.98 5.98 0 001.5 4"></path></svg>
        </div>
        <span class="font-serif italic text-2xl mt-4">&</span>
      </div>

      <!-- Mahira -->
      <div class="w-64 h-80 md:w-80 md:h-[28rem] rounded-2xl overflow-hidden float-3d border-4 border-sage" style="animation-delay: -3s;">
        <img src="1000178607.jpg" alt="Mahira Khan" class="w-full h-full object-cover">
      </div>
    </div>
  </section>

  <!-- Scratch to Reveal Section -->
  <section class="py-24 bg-deepgreen text-offwhite flex flex-col items-center justify-center relative shadow-inner">
    <div class="absolute inset-0 opacity-20 bg-[url('1000178603.jpg')] bg-cover bg-center mix-blend-overlay"></div>
    <h3 class="font-sans text-xl uppercase tracking-widest mb-8 z-10 text-sage">Scratch to reveal the Big Day</h3>
    
    <div class="relative w-80 h-40 md:w-96 md:h-48 rounded-2xl overflow-hidden z-10 shadow-2xl bg-offwhite flex items-center justify-center text-center">
      <div class="p-4">
        <p class="font-serif text-3xl md:text-4xl text-deepgreen font-semibold">Tuesday</p>
        <p class="font-sans text-lg md:text-xl text-sage mt-1">15th December 2026</p>
      </div>
      <canvas id="scratchCanvas"></canvas>
    </div>
  </section>

  <!-- Parallax Venues -->
  <section class="parallax-section relative min-h-screen flex items-center justify-center py-20 px-4" style="background-image: url('1000178604.jpg');">
    <div class="absolute inset-0 bg-black/40"></div>

    <div class="relative z-10 w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 gap-10">
      <!-- Nikaah -->
      <div class="glass-card p-10 rounded-3xl text-center transform transition duration-500 hover:scale-105 hover:-translate-y-2">
        <h4 class="font-sans uppercase text-sm tracking-[0.2em] text-white/80 mb-2">The Nikaah</h4>
        <h2 class="font-serif text-4xl text-white mb-6">VintClub Resort</h2>
        <p class="text-white/90 font-light mb-8">15 Dec 2026 | 10:00 PM</p>
        <a href="https://www.google.com/maps/search/?api=1&query=VintClub+Resort+Lucknow" target="_blank" class="inline-block bg-sage text-offwhite px-8 py-3 rounded-full text-sm font-semibold hover:bg-white hover:text-deepgreen shadow-lg transition-colors">
          Get Directions
        </a>
      </div>

      <!-- Walima -->
      <div class="glass-card p-10 rounded-3xl text-center transform transition duration-500 hover:scale-105 hover:-translate-y-2">
        <h4 class="font-sans uppercase text-sm tracking-[0.2em] text-white/80 mb-2">The Walima</h4>
        <h2 class="font-serif text-4xl text-white mb-6">Saraca Lucknow</h2>
        <p class="text-white/90 font-light mb-8">17 Dec 2026 | 08:00 PM</p>
        <a href="https://www.google.com/maps/search/?api=1&query=Saraca+Lucknow" target="_blank" class="inline-block bg-deepgreen text-offwhite px-8 py-3 rounded-full text-sm font-semibold hover:bg-white hover:text-deepgreen border border-sage/50 shadow-lg transition-colors">
          Get Directions
        </a>
      </div>
    </div>
  </section>

  <!-- External JS Link -->
  <script src="script.js"></script>
</body>
</html>
